services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: takeaway-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: sky_take_out # 数据库 sky_take_out
      MYSQL_USER: takeaway
      MYSQL_PASSWORD: takeaway123456
    ports:
      - "3307:3306" # Docker 中 MySQL 的 3306 端口映射到 WSL2 的 3307 端口
    volumes:
      - mysql_data:/var/lib/mysql
#      - ./sql:/docker-entrypoint-initdb.d # 在容器首次创建是执行初始化脚本
    networks:
      - takeaway-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7.2-alpine
    container_name: takeaway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - takeaway-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  takeaway-network:
    driver: bridge